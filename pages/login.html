<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Login do estudante no MindFlow AI." />
    <title>Login | MindFlow AI</title>
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body>
    <header class="site-header" data-header>
      <nav class="navbar" aria-label="Navegação principal">
        <a class="brand" href="../index.html" aria-label="MindFlow AI - página inicial">
          <span class="brand__mark">M</span>
          <span class="brand__text">MindFlow AI</span>
        </a>

        <button class="nav-toggle" type="button" aria-label="Abrir menu" aria-expanded="false" aria-controls="primary-menu" data-menu-toggle>
          <span></span>
          <span></span>
          <span></span>
        </button>

        <ul class="nav-menu" id="primary-menu" data-menu>
          <li><a href="../index.html">Início</a></li>
          <li><a href="cadastro.html">Cadastro</a></li>
          <li><a href="perfil.html">Perfil</a></li>
        </ul>
      </nav>
    </header>

    <main class="auth-page">
      <section class="auth-layout auth-layout--compact section">
        <div class="auth-copy">
          <p class="eyebrow">Bem-vindo de volta</p>
          <h1>Acesse sua área de estudos.</h1>
          <p>Continue acompanhando metas, perfil e preferências do estudante.</p>
        </div>

        <form class="auth-card" aria-labelledby="login-form-title">
          <div>
            <p class="eyebrow">Login</p>
            <h2 id="login-form-title">Entrar na conta</h2>
          </div>

          <label class="field">
            <span>E-mail</span>
            <input type="email" placeholder="seuemail@exemplo.com" autocomplete="email" />
          </label>
          <label class="field">
            <span>Senha</span>
            <input type="password" placeholder="Sua senha" autocomplete="current-password" />
          </label>

          <div class="form-row">
            <label class="check-field">
              <input type="checkbox" />
              <span>Lembrar acesso</span>
            </label>
            <a href="recuperar-senha.html">Esqueci a senha</a>
          </div>

          <a class="button button--primary" href="perfil.html">Entrar</a>
          <p class="auth-switch">Ainda não tem conta? <a href="cadastro.html">Criar cadastro</a></p>
        </form>
      </section>
    </main>

    <script src="../main.js"></script>
  </body>
</html>
