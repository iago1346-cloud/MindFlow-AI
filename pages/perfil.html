<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Perfil e configurações do estudante no MindFlow AI." />
    <title>Perfil | MindFlow AI</title>
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body>
    <header class="site-header" data-header>
      <nav class="navbar" aria-label="Navegação principal">
        <a class="brand" href="../index.html" aria-label="MindFlow AI - página inicial">
          <span class="brand__mark">M</span>
          <span class="brand__text">MindFlow AI</span>
        </a>

        <button class="nav-toggle" type="button" aria-label="Abrir menu" aria-expanded="false" aria-controls="primary-menu" data-menu-toggle>
          <span></span>
          <span></span>
          <span></span>
        </button>

        <ul class="nav-menu" id="primary-menu" data-menu>
          <li><a href="../index.html">Início</a></li>
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="login.html">Sair</a></li>
        </ul>
      </nav>
    </header>

    <main class="student-area section">
      <aside class="profile-summary" aria-label="Resumo do perfil">
        <div class="avatar" aria-hidden="true">JS</div>
        <h1>Joana Silva</h1>
        <p>Estudante focada no ENEM</p>
        <div class="profile-badges">
          <span>Meta: Medicina</span>
          <span>Turno: Noite</span>
          <span>Rotina: 4h/dia</span>
        </div>
      </aside>

      <section class="profile-content" aria-label="Dados e configurações">
        <div class="profile-panel">
          <div class="section__heading">
            <p class="eyebrow">Perfil</p>
            <h2>Edição de dados</h2>
          </div>

          <form class="profile-form">
            <label class="field">
              <span>Nome</span>
              <input type="text" value="Joana Silva" />
            </label>
            <label class="field">
              <span>E-mail</span>
              <input type="email" value="joana@email.com" />
            </label>
            <label class="field">
              <span>Objetivo</span>
              <select>
                <option>Preparar para o ENEM</option>
                <option>Vestibular</option>
                <option>Ensino Médio</option>
              </select>
            </label>
            <label class="field">
              <span>Curso desejado</span>
              <input type="text" value="Medicina" />
            </label>
            <label class="field field--full">
              <span>Bio de estudos</span>
              <textarea rows="4">Quero organizar minha rotina, melhorar redação e revisar matemática toda semana.</textarea>
            </label>
            <div class="sample-form__actions">
              <button class="button button--primary" type="button">Salvar alterações</button>
              <button class="button button--ghost" type="button">Cancelar</button>
            </div>
          </form>
        </div>

        <div class="profile-panel">
          <div class="section__heading">
            <p class="eyebrow">Configurações</p>
            <h2>Preferências da conta</h2>
          </div>

          <div class="settings-list">
            <label class="setting-item">
              <span>
                <strong>Lembretes de estudo</strong>
                <small>Receber avisos antes dos blocos planejados.</small>
              </span>
              <input type="checkbox" checked />
            </label>
            <label class="setting-item">
              <span>
                <strong>Resumo semanal</strong>
                <small>Mostrar progresso, horas e metas concluídas.</small>
              </span>
              <input type="checkbox" checked />
            </label>
            <label class="setting-item">
              <span>
                <strong>Dicas de revisão</strong>
                <small>Usar sugestões inteligentes para priorizar conteúdos.</small>
              </span>
              <input type="checkbox" />
            </label>
          </div>
        </div>
      </section>
    </main>

    <script src="../main.js"></script>
  </body>
</html>
